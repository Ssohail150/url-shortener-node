<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>URL Shortener</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

  <div class="max-w-6xl mx-auto p-6">

    <div class="mb-10 text-center">

      <h1 class="text-5xl font-bold">
        URL Shortener
      </h1>

      <p class="text-slate-400 mt-3">
        Create short links and track clicks
      </p>

    </div>

    <div class="bg-slate-800 rounded-xl p-6 shadow-lg">

      <div class="flex gap-3">

        <input id="urlInput" type="text" placeholder="https://example.com" class="flex-1 p-4 rounded-lg text-black" />

        <button id="shortenBtn" class="bg-green-600 hover:bg-green-700 px-8 rounded-lg">
          Shorten
        </button>

      </div>

      <div id="result" class="mt-5"></div>

    </div>

    <div class="bg-slate-800 rounded-xl p-6 mt-8 shadow-lg">

      <h2 class="text-2xl font-semibold mb-5">
        Recent URLs
      </h2>

      <table class="w-full">

        <thead>

          <tr class="border-b border-slate-700">

            <th class="text-left py-3">
              Original URL
            </th>

            <th class="text-left py-3">
              Short URL
            </th>

            <th class="text-left py-3">
              Clicks
            </th>

            <th class="text-left py-3">
              Action
            </th>

          </tr>

        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

  <script src="/app.js"></script>

</body>

</html>
